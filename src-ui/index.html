<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PomBlock desktop dashboard" />
    <title>PomBlock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-layer">
      <div class="orb orb-left"></div>
      <div class="orb orb-right"></div>
      <div class="grid-mask"></div>
    </div>

    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <p class="brand-kicker">Workflow Console</p>
          <h1>PomBlock</h1>
        </div>
        <label class="topbar-search" aria-label="&#12503;&#12521;&#12531;&#26908;&#32034;">
          <span aria-hidden="true">&#8981;</span>
          <input type="search" placeholder="Search plans..." autocomplete="off" />
        </label>
        <div class="topbar-actions">
          <nav class="route-nav" id="route-nav" aria-label="Main navigation">
            <a href="#/today" data-route="today">Today</a>
            <a href="#/now" data-route="now">Now</a>
            <a href="#/routines" data-route="routines">Routines</a>
            <a href="#/insights" data-route="insights">Insights</a>
          </nav>
          <a href="#/now" class="focus-launch" data-route="now">Start Focus</a>
          <a
            href="#/settings/auth"
            id="settings-link"
            data-route="settings"
            class="settings-gear"
            aria-label="&#35373;&#23450;&#12434;&#38283;&#12367;"
            title="&#35373;&#23450;"
            >&#9881;</a
          >
        </div>
      </header>

      <main id="app" class="view-root" aria-live="polite"></main>
    </div>

    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
