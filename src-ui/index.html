<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PomoBlock desktop dashboard" />
    <title>PomoBlock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-layer">
      <div class="orb orb-left"></div>
      <div class="orb orb-right"></div>
      <div class="grid-mask"></div>
    </div>

    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <p class="brand-kicker">Workflow Console</p>
          <h1>PomoBlock</h1>
        </div>
        <label class="topbar-search" aria-label="プラン検索">
          <span aria-hidden="true">&#8981;</span>
          <input type="search" placeholder="プランを検索..." autocomplete="off" />
        </label>
        <div class="topbar-actions">
          <nav class="route-nav" id="route-nav" aria-label="メインナビゲーション">
            <a href="#/today" data-route="today">Today</a>
            <a href="#/week" data-route="week">週</a>
            <a href="#/now" data-route="now">実行中</a>
            <a href="#/routines" data-route="routines">ルーティン</a>
            <a href="#/insights" data-route="insights">振り返り</a>
          </nav>
          <a href="#/now" class="focus-launch" data-route="now">集中を開始</a>
          <a
            href="#/settings/auth"
            id="settings-link"
            data-route="settings"
            class="settings-gear"
            aria-label="設定を開く"
            title="設定"
            >&#9881;</a
          >
        </div>
      </header>

      <main id="app" class="view-root" aria-live="polite"></main>
    </div>

    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
